<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com" />
  <title>mini_agent</title>
  <!-- Prism syntax highlighting (lightweight, CSS-class-based, 0.5ms/call) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/themes/prism-tomorrow.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #0a0a0a;
      color: #d4d4d4;
    }

    /* ── Two-column layout ── */
    #app {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    #tool-panel {
      width: 320px;
      flex-shrink: 0;
      background: #0d0d0d;
      border-right: 1px solid #1a3320;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: none;          /* Firefox */
      -ms-overflow-style: none;       /* IE */
    }
    #tool-panel::-webkit-scrollbar { display: none; }  /* Chrome */

    #tool-panel-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b8a6b;
      border-bottom: 1px solid #1a3320;
      flex-shrink: 0;
    }

    #tool-list {
      flex: 1;
      padding: 0.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    #main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Permanent thinking pane (above chat, streamed in real-time) ── */
    #thinking-pane {
      background: #0a0a0a;
      border-bottom: 1px solid #1a3320;
      max-height: 260px;
      display: flex;
      flex-direction: column;
      transition: max-height 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #thinking-pane[hidden] {
      display: none;
    }
    #thinking-pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.3rem 0.75rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b8a6b;
      background: #0d0d0d;
      border-bottom: 1px solid #1a3320;
      flex-shrink: 0;
    }
    #thinking-pane-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0.75rem;
      font-size: 0.76rem;
      color: #8a8a8a;
      white-space: pre-wrap;
      line-height: 1.5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .msg {
      padding: 0.6rem 1rem;
      border-radius: 8px;
      max-width: 80%;
      word-break: break-word;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: #142814;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #111811;
      border: 1px solid #1a2e1a;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: #8a8a8a;
      font-size: 0.8rem;
      font-style: italic;
    }

    .msg.error {
      align-self: center;
      color: #ef4444;
      font-size: 0.8rem;
    }

    /* ── Tool call chips (in sidebar) ── */
    .tool-call {
      width: 100%;
      margin: 0;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      transition: box-shadow 0.25s;
      font-size: 0.72rem;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }

    /* Timeline connector line between consecutive tool calls */
    .tool-call + .tool-call::before {
      content: "";
      position: absolute;
      top: -6px;
      left: 10px;
      width: 2px;
      height: 6px;
      background: #45475a;
      border-radius: 1px;
    }

    .tool-call .tool-header {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.4rem 0.65rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s, border-color 0.2s;
      border-left: 3px solid transparent;
    }

    .tool-call .tool-header:hover {
      filter: brightness(1.15);
    }

    .tool-call .tool-icon {
      flex-shrink: 0;
      width: 1.25rem;
      text-align: center;
      font-size: 0.85rem;
    }

    .tool-call .tool-summary {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0.9;
    }

    .tool-call .tool-chevron {
      flex-shrink: 0;
      font-size: 0.6rem;
      opacity: 0.5;
      transition: transform 0.2s;
    }

    .tool-call.expanded .tool-chevron {
      transform: rotate(90deg);
    }

    .tool-call .tool-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .tool-call.expanded .tool-body {
      max-height: 600px;
      overflow-y: auto;
    }

    .tool-call .tool-detail {
      padding: 0.4rem 0.65rem 0.4rem 2.15rem;
      font-size: 0.73rem;
      color: #a6adc8;
      background: #181825;
      border-top: 1px solid #313244;
      white-space: pre-wrap;
      line-height: 1.45;
    }

    .tool-call .tool-diff {
      padding: 0.4rem 0.65rem 0.4rem 2.15rem;
      font-size: 0.7rem;
      background: #11111b;
      border-top: 1px solid #313244;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    /* Running state — pulsing amber glow */
    .tool-call.running .tool-header {
      background: #2a2618;
      color: #f9e2af;
      border-left-color: #f9e2af;
    }
    .tool-call.running {
      box-shadow: 0 0 6px rgba(249, 226, 175, 0.12);
    }
    @keyframes tool-spin {
      to { transform: rotate(360deg); }
    }
    .tool-call.running .tool-icon {
      animation: tool-spin 1.4s linear infinite;
    }

    /* Success state — crisp green */
    .tool-call.success .tool-header {
      background: #1a281c;
      color: #a6e3a1;
      border-left-color: #a6e3a1;
    }

    /* Failure state — soft red */
    .tool-call.failure .tool-header {
      background: #2a1a1c;
      color: #f38ba8;
      border-left-color: #f38ba8;
    }

    /* Category accent borders (shown when running/complete) */
    .tool-call.cat-read    .tool-header { border-left-color: #89b4fa; }
    .tool-call.cat-write   .tool-header { border-left-color: #a6e3a1; }
    .tool-call.cat-bash    .tool-header { border-left-color: #f9e2af; }
    .tool-call.cat-search  .tool-header { border-left-color: #cba6f7; }
    .tool-call.cat-memory  .tool-header { border-left-color: #94e2d5; }
    .tool-call.cat-other   .tool-header { border-left-color: #6c7086; }

    .tool-call.cat-read    .tool-header { background: #1a1e2a; color: #89b4fa; }
    .tool-call.cat-write   .tool-header { background: #1a221c; color: #a6e3a1; }
    .tool-call.cat-bash    .tool-header { background: #22201a; color: #f9e2af; }
    .tool-call.cat-search  .tool-header { background: #1f1a28; color: #cba6f7; }
    .tool-call.cat-memory  .tool-header { background: #1a2422; color: #94e2d5; }
    .tool-call.cat-other   .tool-header { background: #1a1a20; color: #6c7086; }

    /* Running overrides category background but keeps border */
    .tool-call.running.cat-read    .tool-header { background: #1e2430; }
    .tool-call.running.cat-write   .tool-header { background: #1e281e; }
    .tool-call.running.cat-bash    .tool-header { background: #28241a; }
    .tool-call.running.cat-search  .tool-header { background: #241e2e; }
    .tool-call.running.cat-memory  .tool-header { background: #1e2826; }
    .tool-call.running.cat-other   .tool-header { background: #1e1e26; }

    /* ── Thinking pane (collapsible reasoning block) ── */
    .thinking-pane {
      align-self: flex-start;
      max-width: 85%;
      margin: 0.2rem 0;
      border-radius: 8px;
      background: #181825;
      border: 1px solid #2a2a3a;
      overflow: hidden;
      font-size: 0.76rem;
      transition: border-color 0.2s;
    }
    .thinking-pane summary {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.65rem;
      cursor: pointer;
      user-select: none;
      color: #6c7086;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.73rem;
      list-style: none;
    }
    .thinking-pane summary::-webkit-details-marker { display: none; }
    .thinking-pane summary .thinking-icon {
      font-size: 0.85rem;
    }
    .thinking-pane summary .thinking-label {
      flex: 1;
    }
    .thinking-pane summary .thinking-chevron {
      font-size: 0.55rem;
      transition: transform 0.2s;
      opacity: 0.5;
    }
    .thinking-pane[open] summary .thinking-chevron {
      transform: rotate(90deg);
    }
    .thinking-pane .thinking-body {
      padding: 0.4rem 0.65rem 0.4rem 2rem;
      color: #6c7086;
      white-space: pre-wrap;
      line-height: 1.45;
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid #2a2a3a;
    }

    #input-area {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid #45475a;
    }

    #input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 1px solid #45475a;
      border-radius: 6px;
      background: #313244;
      color: #cdd6f4;
      font-size: 0.95rem;
      outline: none;
    }

    #input:focus {
      border-color: #89b4fa;
    }

    #send {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 6px;
      background: #89b4fa;
      color: #1e1e2e;
      font-weight: 600;
      cursor: pointer;
    }

    #send:hover {
      background: #74c7ec;
    }

    #send:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #status {
      display: flex;
      gap: 1rem;
      padding: 0.25rem 1rem;
      font-size: 0.7rem;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      color: #6c7086;
      border-top: 1px solid #313244;
      background: #181825;
      flex-wrap: wrap;
      align-items: center;
      min-height: 1.4rem;
    }
    #status .stat {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      white-space: nowrap;
    }
    #status .stat.icon { opacity: 0.7; }
    #status .stat.label { color: #585b70; }
    #status .stat.value { color: #a6adc8; }
    #status .stat.branch .value { color: #94e2d5; }
    #status .stat.model  .value { color: #89b4fa; }
    #status .stat.workspace .value { color: #f9e2af; }
  </style>
</head>
<body>

  <div id="app">
    <div id="tool-panel">
      <div id="tool-panel-header">🛠 Tools</div>
      <div id="tool-list"></div>
    </div>
    <div id="main-panel">
      <div id="messages"></div>
      <div id="thinking-pane" hidden>
        <div id="thinking-pane-header">
          <span>🧠 Thinking…</span>
          <span id="thinking-pane-close" onclick="document.getElementById('thinking-pane').hidden = true" style="cursor:pointer;opacity:0.5;">✕</span>
        </div>
        <div id="thinking-pane-body"></div>
      </div>
      <div id="status">Initializing…</div>

      <form id="input-area" autocomplete="off">
        <input type="text" id="input" placeholder="Connecting…" disabled />
        <button type="submit" id="send" disabled>Send</button>
      </form>
    </div>
  </div>

  <script>
    // ── state ──
    const messagesEl = document.getElementById("messages");
    const toolList    = document.getElementById("tool-list");
    const inputEl    = document.getElementById("input");
    const sendBtn    = document.getElementById("send");
    const statusEl   = document.getElementById("status");

    let DEBUG = false;            // toggle with Ctrl+Shift+D
    let initialized = false;
    let turnCount = 0;
    let lastSessionInfo = null;  // cached for status bar re-render
    let nextId = 1;
    let assistantMsgEl = null;   // streaming message element (grows as tokens arrive)
    let activeToolEl = null;     // current tool-call chip (updated by tool_end)
    let thinkingPaneEl = null;   // collapsible reasoning block (populated between [thinking]/[/thinking])
    let inThinking = false;
    let sendPending = false;

    // ── helpers ──
    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function getToolCategory(name) {
      const readTools   = ["read_file", "file_info", "list_directory", "lsp_definition", "lsp_hover", "lsp_references", "lsp_diagnostics", "read_image", "semantic_search"];
      const writeTools  = ["write_file", "edit_file", "write_scratchpad", "plan"];
      const bashTools   = ["run_shell", "run_tests", "git", "verify", "diff", "task_status", "diagnose_failures"];
      const searchTools = ["search_files", "find_symbol", "find_usages", "web_search"];
      const memTools    = ["remember", "recall_turn", "plan_status", "session_stats"];

      if (readTools.includes(name))   return { icon: "\ud83d\udcc4", cat: "cat-read" };
      if (writeTools.includes(name))  return { icon: "\u270f\ufe0f", cat: "cat-write" };
      if (bashTools.includes(name))   return { icon: "\u26a1",     cat: "cat-bash" };
      if (searchTools.includes(name)) return { icon: "\ud83d\udd0d", cat: "cat-search" };
      if (memTools.includes(name))    return { icon: "\ud83e\udde0", cat: "cat-memory" };
      return                           { icon: "\ud83d\udd27", cat: "cat-other" };
    }

    function addMessage(role, text, persistent = true) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      if (role === "assistant") {
        div.innerHTML = highlightContent(text);
      } else {
        div.textContent = text;
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return persistent ? div : null;
    }

    function highlightContent(text) {
      // Wrap ```code``` blocks in <pre><code> for Prism highlighting
      return text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        const cls = lang ? ` class="language-${lang}"` : "";
        const escaped = code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        try {
          if (Prism.languages[lang] || lang === "") {
            const html = Prism.highlight(code.trimEnd(), Prism.languages[lang] || Prism.languages.plain, lang || "plain");
            return `<pre${cls}><code${cls}>${html}</code></pre>`;
          }
        } catch (_) {}
        return `<pre${cls}><code${cls}>${escaped}</code></pre>`;
      });
    }

    function highlightMessage(el) {
      // Re-run Prism on all code blocks in an element
      el.querySelectorAll("pre code").forEach(block => Prism.highlightElement(block));
    }

    function setStatus(text) {
      statusEl.innerHTML = `<span class="stat">${escapeHtml(text)}</span>`;
    }

    function setReady() {
      initialized = true;
      if (lastSessionInfo) renderStatusBar(lastSessionInfo);
      else setStatus("Ready");
      inputEl.disabled = false;
      inputEl.placeholder = "Type a message…";
      sendBtn.disabled = false;
      inputEl.focus();
    }

    function renderStatusBar(info) {
      let html = "";
      if (info.workspace) {
        const name = info.workspace.split("/").pop() || info.workspace;
        html += `<span class="stat workspace"><span class="icon">📁</span><span class="label">workspace</span><span class="value">${escapeHtml(name)}</span></span>`;
      }
      if (info.git_branch) {
        html += `<span class="stat branch"><span class="icon">🌿</span><span class="value">${escapeHtml(info.git_branch)}</span></span>`;
      }
      if (info.model) {
        const short = info.model.replace(/^deepseek[-\/]/, "").replace(/^openai\//, "");
        html += `<span class="stat model"><span class="icon">🧠</span><span class="value">${escapeHtml(short)}</span></span>`;
      }
      html += `<span class="stat"><span class="icon">↻</span><span class="value">${turnCount}</span></span>`;
      statusEl.innerHTML = html || "Ready";
    }

    // ── JSON-RPC ──
    async function rpc(method, params = {}) {
      const id = nextId++;
      const req = JSON.stringify({ jsonrpc: "2.0", id, method, params });
      if (DEBUG) addMessage("system", `→ ${method} (id=${id})`);
      try {
        const result = await window.bridge.send(req);
        if (!result.ok) {
          addMessage("error", `Send error: ${result.error}`);
        }
      } catch (e) {
        addMessage("error", `bridge.send() threw: ${e.message}`);
      }
    }

    // ── Handle bridge output (JSON lines) ──
    function handleBridgeLine(line) {
      try {
        const obj = JSON.parse(line);
        processMessage(obj);
      } catch {
        // non-JSON output (e.g. startup banner) — show as system
        addMessage("system", line);
      }
    }

    function processMessage(obj) {
      // --- init result ---
      if (obj.jsonrpc === "2.0" && obj.result && obj.result.status === "ok" && !initialized) {
        setReady();
        return;
      }

      // --- session info (status bar) ---
      if (obj.type === "session_info") {
        lastSessionInfo = obj;
        renderStatusBar(obj);
        return;
      }

      // --- streaming token ---
      if (obj.type === "token") {
        const tok = obj.content;

        // Route thinking content to the permanent pane
        if (inThinking) {
          const body = document.getElementById("thinking-pane-body");
          if (body) body.textContent += tok;
          return;
        }

        // Normal assistant text
        if (!assistantMsgEl) {
          assistantMsgEl = addMessage("assistant", "");
        }
        assistantMsgEl._text = (assistantMsgEl._text || "") + tok;
        assistantMsgEl.innerHTML = highlightContent(assistantMsgEl._text);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return;
      }

      // --- thinking block delimiters (from bridge, no embedded newlines) ---
      if (obj.type === "thinking_start") {
        inThinking = true;
        const pane = document.getElementById("thinking-pane");
        const body = document.getElementById("thinking-pane-body");
        body.textContent = "";
        pane.hidden = false;
        return;
      }
      if (obj.type === "thinking_end") {
        inThinking = false;
        return;
      }

      // --- tool call started ---
      if (obj.type === "tool_start") {
        const cat = getToolCategory(obj.tool_name || "");
        activeToolEl = document.createElement("div");
        activeToolEl.className = `tool-call running ${cat.cat} expanded`;
        activeToolEl.innerHTML =
          `<div class="tool-header" onclick="this.parentElement.classList.toggle('expanded')">` +
            `<span class="tool-icon">${cat.icon}</span>` +
            `<span class="tool-summary" title="${escapeHtml(obj.summary)}">${escapeHtml(obj.summary)}</span>` +
            `<span class="tool-chevron">▶</span>` +
          `</div>` +
          `<div class="tool-body"></div>`;
        toolList.appendChild(activeToolEl);
        toolList.scrollTop = toolList.scrollHeight;
        return;
      }

      // --- tool call finished ---
      if (obj.type === "tool_end") {
        if (activeToolEl) {
          const statusIcon = obj.success ? "✓" : "✗";
          activeToolEl.className = activeToolEl.className.replace(/\brunning\b/, obj.success ? "success" : "failure");
          activeToolEl.classList.remove("expanded");
          const iconSpan = activeToolEl.querySelector(".tool-icon");
          if (iconSpan) {
            iconSpan.textContent = statusIcon;
            iconSpan.style.animation = "";  // stop spinner
          }
          const body = activeToolEl.querySelector(".tool-body");
          if (body) {
            let html = "";
            if (obj.detail && obj.detail !== "OK") {
              html += `<div class="tool-detail">${escapeHtml(obj.detail)}</div>`;
            }
            if (obj.diff_preview) {
              html += `<div class="tool-diff">${escapeHtml(obj.diff_preview)}</div>`;
            }
            body.innerHTML = html;
          }
        }
        activeToolEl = null;
        toolList.scrollTop = toolList.scrollHeight;
        return;
      }

      // --- final chat result ---
      if (obj.jsonrpc === "2.0" && obj.result) {
        if (obj.result.cancelled) {
          if (assistantMsgEl) {
            assistantMsgEl.textContent += " [cancelled]";
            assistantMsgEl = null;
          }
          inThinking = false;
          document.getElementById("thinking-pane").hidden = true;
          addMessage("system", "Request cancelled.");
        } else {
          if (!assistantMsgEl && obj.result.content) {
            addMessage("assistant", obj.result.content);
          }
          assistantMsgEl = null;
          inThinking = false;
          document.getElementById("thinking-pane").hidden = true;
        }
        setReady();
        turnCount++;
        sendPending = false;
        return;
      }

      // --- error ---
      if (obj.jsonrpc === "2.0" && obj.error) {
        addMessage("error", `Error ${obj.error.code}: ${obj.error.message}`);
        assistantMsgEl = null;
        thinkingPaneEl = null;
        inThinking = false;
        sendPending = false;
        setReady();
        return;
      }

      // --- anything else ---
      if (DEBUG) addMessage("system", JSON.stringify(obj));
    }

    // ── Wire bridge events ──
    if (window.bridge) {
      window.bridge.onStdout((text) => {
        // stdout may contain multiple JSON lines from buffering
        const lines = text.split("\n").filter(Boolean);
        lines.forEach(line => {
          if (DEBUG) addMessage("system", `← ${line.substring(0, 120)}`);
          handleBridgeLine(line);
        });
      });

      window.bridge.onStderr((text) => {
        addMessage("system", `[stderr] ${text}`);
      });

      window.bridge.onClose((code) => {
        addMessage("system", `Bridge closed (code ${code})`);
        setStatus("Disconnected");
        inputEl.disabled = true;
        sendBtn.disabled = true;
      });
    } else {
      addMessage("error", "Bridge API not available. Is preload.js loading?");
    }

    // ── Form submit ──
    document.getElementById("input-area").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!initialized || sendPending) return;

      const text = inputEl.value.trim();
      if (!text) return;

      addMessage("user", text);
      inputEl.value = "";
      sendBtn.disabled = true;
      setStatus("Thinking…");
      sendPending = true;
      document.getElementById("thinking-pane").hidden = true;

      await rpc("chat", { message: text });
    });

    // ── Startup: send init (retry if bridge not ready) ──
    let initAttempts = 0;
    let initTimeoutId = null;
    function tryInit() {
      initAttempts++;
      if (window.bridge) {
        setStatus("Connecting…");
        rpc("init", { workspace: null });
        // Timeout: if no response in 15s, show error
        initTimeoutId = setTimeout(() => {
          if (!initialized) {
            addMessage("error", "Init timed out after 15s. Backend may be slow to start. Retrying…");
            tryInit();
          }
        }, 15000);
        return;
      }
      if (initAttempts < 20) {
        setTimeout(tryInit, 250);  // retry every 250ms for ~5s
      } else {
        addMessage("error", "Bridge not available after 5s. Check that Electron is running with preload.js.");
        setStatus("Bridge unavailable");
      }
    }
    setTimeout(tryInit, 500);  // give IPC time to settle

    // ── Ctrl+Shift+D: toggle debug ──
    document.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === "D") {
        e.preventDefault();
        DEBUG = !DEBUG;
        addMessage("system", DEBUG ? "🛠 Debug ON — raw JSON-RPC visible" : "🛠 Debug OFF");
      }
    });
  </script>

</body>
</html>
