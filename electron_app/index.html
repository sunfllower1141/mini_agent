<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" />
  <title>mini_agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1e1e2e;
      color: #cdd6f4;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .msg {
      padding: 0.6rem 1rem;
      border-radius: 8px;
      max-width: 80%;
      word-break: break-word;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: #45475a;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #313244;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: #a6adc8;
      font-size: 0.8rem;
      font-style: italic;
    }

    .msg.error {
      align-self: center;
      color: #f38ba8;
      font-size: 0.8rem;
    }

    #input-area {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid #45475a;
    }

    #input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 1px solid #45475a;
      border-radius: 6px;
      background: #313244;
      color: #cdd6f4;
      font-size: 0.95rem;
      outline: none;
    }

    #input:focus {
      border-color: #89b4fa;
    }

    #send {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 6px;
      background: #89b4fa;
      color: #1e1e2e;
      font-weight: 600;
      cursor: pointer;
    }

    #send:hover {
      background: #74c7ec;
    }

    #send:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #status {
      padding: 0.3rem 1rem;
      font-size: 0.75rem;
      color: #a6adc8;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="messages"></div>
  <div id="status">Initializing…</div>

  <form id="input-area" autocomplete="off">
    <input type="text" id="input" placeholder="Connecting…" disabled />
    <button type="submit" id="send" disabled>Send</button>
  </form>

  <script>
    // ── state ──
    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("input");
    const sendBtn    = document.getElementById("send");
    const statusEl   = document.getElementById("status");

    let initialized = false;
    let nextId = 1;
    let assistantMsgEl = null;   // streaming message element (grows as tokens arrive)
    let sendPending = false;

    // ── helpers ──
    function addMessage(role, text, persistent = true) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return persistent ? div : null;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setReady() {
      initialized = true;
      setStatus("Ready");
      inputEl.disabled = false;
      inputEl.placeholder = "Type a message…";
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // ── JSON-RPC ──
    async function rpc(method, params = {}) {
      const id = nextId++;
      const req = JSON.stringify({ jsonrpc: "2.0", id, method, params });
      addMessage("system", `→ ${method} (id=${id})`);
      try {
        const result = await window.bridge.send(req);
        if (!result.ok) {
          addMessage("error", `Send error: ${result.error}`);
        }
      } catch (e) {
        addMessage("error", `bridge.send() threw: ${e.message}`);
      }
    }

    // ── Handle bridge output (JSON lines) ──
    function handleBridgeLine(line) {
      try {
        const obj = JSON.parse(line);
        processMessage(obj);
      } catch {
        // non-JSON output (e.g. startup banner) — show as system
        addMessage("system", line);
      }
    }

    function processMessage(obj) {
      // --- init result ---
      if (obj.jsonrpc === "2.0" && obj.result && obj.result.status === "ok" && !initialized) {
        setReady();
        addMessage("system", "Connected to mini_agent backend.");
        return;
      }

      // --- streaming token ---
      if (obj.type === "token") {
        if (!assistantMsgEl) {
          assistantMsgEl = addMessage("assistant", "");
        }
        assistantMsgEl.textContent += obj.content;
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return;
      }

      // --- final chat result ---
      if (obj.jsonrpc === "2.0" && obj.result) {
        if (obj.result.cancelled) {
          if (assistantMsgEl) {
            assistantMsgEl.textContent += " [cancelled]";
            assistantMsgEl = null;
          }
          addMessage("system", "Request cancelled.");
        } else {
          // If we were streaming, finalize the streaming message.
          // If not (no tokens, all-at-once response), show the content.
          if (!assistantMsgEl && obj.result.content) {
            addMessage("assistant", obj.result.content);
          }
          assistantMsgEl = null;
        }
        setReady();
        sendPending = false;
        return;
      }

      // --- error ---
      if (obj.jsonrpc === "2.0" && obj.error) {
        addMessage("error", `Error ${obj.error.code}: ${obj.error.message}`);
        assistantMsgEl = null;
        sendPending = false;
        setReady();
        return;
      }

      // --- anything else ---
      addMessage("system", JSON.stringify(obj));
    }

    // ── Wire bridge events ──
    if (window.bridge) {
      window.bridge.onStdout((text) => {
        // stdout may contain multiple JSON lines from buffering
        const lines = text.split("\n").filter(Boolean);
        lines.forEach(line => {
          addMessage("system", `← ${line.substring(0, 120)}`);
          handleBridgeLine(line);
        });
      });

      window.bridge.onStderr((text) => {
        addMessage("system", `[stderr] ${text}`);
      });

      window.bridge.onClose((code) => {
        addMessage("system", `Bridge closed (code ${code})`);
        setStatus("Disconnected");
        inputEl.disabled = true;
        sendBtn.disabled = true;
      });
    } else {
      addMessage("error", "Bridge API not available. Is preload.js loading?");
    }

    // ── Form submit ──
    document.getElementById("input-area").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!initialized || sendPending) return;

      const text = inputEl.value.trim();
      if (!text) return;

      addMessage("user", text);
      inputEl.value = "";
      sendBtn.disabled = true;
      setStatus("Thinking…");
      sendPending = true;

      await rpc("chat", { message: text });
    });

    // ── Startup: send init (retry if bridge not ready) ──
    let initAttempts = 0;
    let initTimeoutId = null;
    function tryInit() {
      initAttempts++;
      if (window.bridge) {
        setStatus("Connecting…");
        rpc("init", { workspace: null });
        // Timeout: if no response in 15s, show error
        initTimeoutId = setTimeout(() => {
          if (!initialized) {
            addMessage("error", "Init timed out after 15s. Backend may be slow to start. Retrying…");
            tryInit();
          }
        }, 15000);
        return;
      }
      if (initAttempts < 20) {
        setTimeout(tryInit, 250);  // retry every 250ms for ~5s
      } else {
        addMessage("error", "Bridge not available after 5s. Check that Electron is running with preload.js.");
        setStatus("Bridge unavailable");
      }
    }
    setTimeout(tryInit, 500);  // give IPC time to settle
  </script>

</body>
</html>
