id: "patch-off-by-one"
name: "Fix off-by-one in factorial function"
description: |
  The file `math_utils.py` contains a bug.  The function `factorial_list(n: int) -> list[int]`
  should return `[1!, 2!, ..., n!]` (factorials from 1 to n inclusive), but it
  returns `[1!, 2!, ..., (n-1)!]` because `range(1, n)` excludes `n`.
  Find the off-by-one error in `range(1, n)` and fix it to `range(1, n + 1)`.
  Run `python -c "from math_utils import factorial_list; print(factorial_list(5))"`
  to verify the fix — it should print `[1, 2, 6, 24, 120]`.
category: "bugfix"
difficulty: "easy"
workspace_fixture: "mini_repo"
checks:
  - type: "file_contains"
    path: "math_utils.py"
    pattern: "range\\(1, n \\+ 1\\)"
  - type: "shell"
    command: "python -c 'from math_utils import factorial_list; assert factorial_list(5) == [1, 2, 6, 24, 120]'"
expected_tools:
  - "read_file"
  - "edit_file"
  - "run_shell"
expected_turns_max: 8
tags: ["bugfix", "basics", "off-by-one"]
