<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
  // Apply persisted theme before paint to avoid FOUC
  (function() {
    var t = localStorage.getItem('mini_agent_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
